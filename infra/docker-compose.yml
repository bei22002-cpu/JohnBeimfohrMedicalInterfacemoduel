# Example stack: TLS terminates at clinic reverse proxy / Application Gateway in production.
# From repo root: docker compose -f infra/docker-compose.yml up --build
name: cardiology-exam-room
services:
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        VITE_FLEET_API_URL: /fleet
        VITE_ROOM_ID: room-docker-01
        VITE_CONTENT_VERSION: "${CONTENT_VERSION:-1.0.0}"
        VITE_USE_MEDICAL_ASR: "1"
    ports:
      - "8080:80"
    depends_on:
      - fleet
      - imaging

  fleet:
    build:
      context: ../services/fleet-api
      dockerfile: Dockerfile
    environment:
      PORT: "3001"
      CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      CONTENT_VERSION: "${CONTENT_VERSION:-1.0.0}"
      AZURE_SPEECH_KEY: "${AZURE_SPEECH_KEY:-}"
      AZURE_SPEECH_REGION: "${AZURE_SPEECH_REGION:-}"
      HIPAA_MINIMAL_LOGGING: "1"
      DATA_DIR: "/data"
    volumes:
      - fleet_data:/data
    ports:
      - "3001:3001"

  imaging:
    build:
      context: ../services/imaging-service
      dockerfile: Dockerfile
    environment:
      # Optional: point to nnU-Net weights directory
      nnUNet_results: "/data/nnunet_weights"
      # Optional: Slicer not supported in container by default
      SLICER_PATH: ""
      # Tighten CORS in production. In docker stack we go through nginx (same-origin),
      # but keeping this sane helps if the service is accessed directly.
      CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
    volumes:
      - imaging_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  fleet_data: {}
  imaging_data: {}
